name: Deploy Live

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Auth DB Migration Check (In-Memory)
        run: npm run db:migrate:test

      - name: Auth Test Suite
        run: npm run test:auth

      - name: Build
        run: npm run build

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIVE_HOST }}
          username: ${{ secrets.LIVE_USER }}
          key: ${{ secrets.LIVE_SSH_KEY }}
          port: ${{ secrets.LIVE_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.LIVE_REPO_PATH }}"
            chmod +x scripts/deploy-live.sh
            ./scripts/deploy-live.sh "${{ secrets.LIVE_REPO_PATH }}" main
