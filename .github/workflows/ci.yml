name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Auth DB Migration Check (In-Memory)
        run: npm run db:migrate:test

      - name: Auth Test Suite
        run: npm run test:auth

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
