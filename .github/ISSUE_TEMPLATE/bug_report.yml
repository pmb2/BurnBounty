name: Bug report
description: Report a reproducible problem
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps, inputs, and expected result.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, and app env details (no secrets).
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
